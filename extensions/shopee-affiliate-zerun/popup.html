<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zerun Shopee Affiliate</title>
    <link rel="stylesheet" href="styles/popup.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <p class="eyebrow">Zerun Extension</p>
          <h1>Shopee Affiliate</h1>
        </div>
        <span id="statusBadge" class="badge">Đang kiểm tra</span>
      </header>

      <section class="panel">
        <label>
          WebSocket
          <input id="wsUrl" type="text" />
        </label>
        <div class="grid">
          <button id="connectButton" type="button">Connect</button>
          <button id="disconnectButton" type="button" class="secondary">Disconnect</button>
        </div>
      </section>

      <p id="message" class="message"></p>
    </main>
    <script src="js/popup.js"></script>
  </body>
</html>
